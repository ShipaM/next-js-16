# Docker Compose для локальной разработки
# Запуск: docker-compose -f docker-compose.dev.yml up
#
# Особенности:
# - Hot reload: изменения в коде автоматически подхватываются
# - Development режим Next.js с TurboPack
# - Prisma миграции выполняются при старте
# - Данные БД сохраняются в volume между перезапусками

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Доступ к БД с хоста: localhost:5432
      - "5432:5432"
    volumes:
      # Сохранение данных БД между перезапусками
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Проверка готовности PostgreSQL
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      RUN_SEED_ON_START: ${RUN_SEED_ON_START:-true}
    ports:
      # Доступ к приложению: localhost:3000
      - "3000:3000"
    volumes:
      # Монтирование кода для hot reload
      - .:/app
      # Исключение node_modules (используются внутри контейнера)
      - /app/node_modules
      # Исключение .next (генерируется внутри контейнера)
      - /app/.next
    command: sh -c "npx prisma migrate deploy && if [ \"$RUN_SEED_ON_START\" = \"true\" ]; then npx tsx prisma/seed.ts; fi && npm run dev -- --hostname 0.0.0.0"

volumes:
  postgres_data:
